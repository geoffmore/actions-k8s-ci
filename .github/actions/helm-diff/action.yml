name: Helm Chart Diff
description: >
  Diffs rendered Helm chart manifests between the base and PR branches.
  Walks up the directory tree from each changed file to find the nearest
  Chart.yaml, then produces a manifest diff for each render scenario:
  default (values.yaml only), plus one scenario per extra-values file.
  Results are posted to the job summary. Optionally lints each PR render.

inputs:
  paths:
    description: Glob pattern scoping which changed files trigger diff (e.g. charts/**)
    required: true
  extra-values:
    description: >
      Space-separated list of extra values files (relative to chart root).
      Each file produces an independent render scenario layered on top of
      values.yaml. Files absent from a chart are silently skipped for that chart.
      E.g. "stage.values.yaml test.values.yaml"
    required: false
    default: ''
  lint:
    description: Run kube-linter on each PR render and fail the step if issues are found.
    required: false
    default: 'false'
  kube-linter-config:
    description: Path to kube-linter config. Defaults to repo .kube-linter.yaml, then bundled config.
    required: false
    default: ''
  image:
    description: >
      actions-k8s-ci image to use.
    required: false
    default: 'public.ecr.aws/e3l5p3n5/geoffmore/actions-k8s-ci:latest'

runs:
  using: composite
  steps:
    - name: Get changed files
      id: changed
      uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
      with:
        files: ${{ inputs.paths }}

    - name: Diff affected Helm charts
      if: steps.changed.outputs.any_changed == 'true'
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        BASE_REF: ${{ github.base_ref }}
        ALL_CHANGED_FILES: ${{ steps.changed.outputs.all_changed_files }}
        EXTRA_VALUES: ${{ inputs.extra-values }}
        LINT: ${{ inputs.lint }}
        KUBE_LINTER_CONFIG: ${{ inputs.kube-linter-config }}
      run: |
        find_chart() {
          local dir="$1"
          while [ "$dir" != "." ] && [ "$dir" != "/" ]; do
            if [ -f "$dir/Chart.yaml" ]; then
              echo "$dir"
              return
            fi
            dir="$(dirname "$dir")"
          done
        }

        git fetch origin --depth 1 "$BASE_REF"
        git worktree add /tmp/base "origin/$BASE_REF"

        # Always render the default scenario; append one scenario per extra-values file.
        # Empty string sentinel represents the default (no extra-values).
        scenarios=("")
        for f in $EXTRA_VALUES; do
          scenarios+=("$f")
        done

        declare -A seen
        failed=0
        for file in $ALL_CHANGED_FILES; do
          chart="$(find_chart "$(dirname "$file")")"
          if [ -n "$chart" ] && [ -z "${seen[$chart]:-}" ]; then
            seen[$chart]=1

            for scenario in "${scenarios[@]}"; do
              if [ -z "$scenario" ]; then
                extra_args=()
                label="$chart"
              else
                extra_args=(--extra-values "$scenario")
                label="$chart ($scenario)"
              fi

              {
                echo "---"
                echo "## Manifest Diff: \`$label\`"
              } >> "$GITHUB_STEP_SUMMARY"

              base_tmp="$(mktemp)"
              pr_tmp="$(mktemp)"

              docker run --rm --user "$(id -u):$(id -g)" \
                -v "${{ github.workspace }}:${{ github.workspace }}" \
                -v /tmp/base:/tmp/base \
                -w /tmp/base \
                "$IMAGE" \
                helm-render-chart "${extra_args[@]+"${extra_args[@]}"}" "$chart" \
                > "$base_tmp" 2>/dev/null || true

              docker run --rm --user "$(id -u):$(id -g)" \
                -v "${{ github.workspace }}:${{ github.workspace }}" \
                -w "${{ github.workspace }}" \
                "$IMAGE" \
                helm-render-chart "${extra_args[@]+"${extra_args[@]}"}" "$chart" \
                > "$pr_tmp" 2>/dev/null || true

              if [ "$LINT" = "true" ]; then
                lint_args=(kube-linter lint)
                [ -n "$KUBE_LINTER_CONFIG" ] && lint_args+=(--config "$KUBE_LINTER_CONFIG")
                echo "::group::Linting $label"
                lint_output="$(docker run --rm --user "$(id -u):$(id -g)" \
                  -v "$pr_tmp:/pr.yaml:ro" \
                  "$IMAGE" \
                  "${lint_args[@]}" /pr.yaml 2>&1)" && lint_rc=0 || lint_rc=$?
                echo "$lint_output"
                echo "::endgroup::"
                if [ "$lint_rc" -ne 0 ]; then
                  failed=1
                  {
                    echo ""
                    echo "> [!WARNING]"
                    echo "> **Lint issues**"
                    echo "$lint_output" | while IFS= read -r line; do echo "> $line"; done
                    echo ""
                  } >> "$GITHUB_STEP_SUMMARY"
                fi
              fi

              docker run --rm --user "$(id -u):$(id -g)" \
                -v "$base_tmp:/base.yaml:ro" \
                -v "$pr_tmp:/pr.yaml:ro" \
                "$IMAGE" \
                diff-manifests /base.yaml /pr.yaml >> "$GITHUB_STEP_SUMMARY"

              rm -f "$base_tmp" "$pr_tmp"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            done
          fi
        done

        git worktree remove /tmp/base
        exit $failed
