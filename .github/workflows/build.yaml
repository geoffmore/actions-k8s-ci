name: build

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - tools/**
      - .kube-linter.yaml
  pull_request:
    paths:
      - Dockerfile
      - tools/**
      - .kube-linter.yaml
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # required for OIDC
      security-events: write  # required for uploading SARIF to the Security tab
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # The default "docker" buildx driver can't export cache (cache-to)
      # backends at all - only the container-backed driver this sets up can.
      # It still supports --load below, so this is a strict upgrade.
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          load: true
          tags: actions-k8s-ci:candidate
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: actions-k8s-ci:candidate
          severity: CRITICAL,HIGH
          exit-code: '1'
          # Unfixed CVEs (no upstream patch available yet) shouldn't block CI -
          # there's nothing actionable to do about them here. Only fail on
          # CVEs where upgrading actually resolves something.
          ignore-unfixed: true
          # Fixes exist upstream for these but haven't reached a released
          # version of the tool that ships them yet - see .trivyignore.
          trivyignores: .trivyignore
          format: sarif
          output: trivy-results.sarif
          # With format: sarif the action scans ALL severities for the report
          # and ignores the `severity` filter when computing exit-code, so the
          # gate would trip on Medium/Low noise. This makes both the SARIF and
          # the exit-code honor `severity: CRITICAL,HIGH` above.
          limit-severities-for-sarif: true

      - name: Upload Trivy scan results to GitHub Security tab
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: trivy-results.sarif

      - name: Run image smoke tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            -w /repo \
            actions-k8s-ci:candidate \
            testdata/image/test.sh

      - name: Run image smoke tests under arbitrary UID
        run: |
          docker run --rm --user "$(id -u):$(id -g)" \
            -v ${{ github.workspace }}:/repo \
            -w /repo \
            actions-k8s-ci:candidate \
            testdata/image/test-arbitrary-uid.sh

      - name: Run tool tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            -w /repo \
            actions-k8s-ci:candidate \
            testdata/argocd/test.sh
          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            -w /repo \
            actions-k8s-ci:candidate \
            testdata/diff-manifests/run-tests.sh
          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            -w /repo \
            actions-k8s-ci:candidate \
            testdata/helm/test.sh

      # Everything below publishes the image and commits back to main, so it
      # only runs for push and workflow_dispatch - never for pull_request,
      # whether from a branch or a fork. Fork PRs don't get an OIDC token or
      # write access regardless (GitHub strips both for security), so this
      # would fail loudly otherwise; gating it explicitly keeps a PR's checks
      # green on build+scan+test alone and makes the split intentional rather
      # than an implicit GitHub quirk. Listing allowed events (rather than
      # excluding pull_request) keeps this fail-closed as new triggers are added.
      - uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        with:
          role-to-assume: arn:aws:iam::245976212095:role/github-actions/geoffmore/actions-k8s-ci/ecr-push
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 # v2.1.1
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        with:
          registry-type: public

      - name: Push image
        id: push
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          tags: |
            public.ecr.aws/e3l5p3n5/geoffmore/actions-k8s-ci:latest
            public.ecr.aws/e3l5p3n5/geoffmore/actions-k8s-ci:${{ github.sha }}
            public.ecr.aws/e3l5p3n5/geoffmore/actions-k8s-ci:r${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pin image digest in action defaults
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          IMAGE: public.ecr.aws/e3l5p3n5/geoffmore/actions-k8s-ci
        run: |
          pinned="${IMAGE}@${DIGEST}"
          find .github/actions -name 'action.yml' | xargs sed -i \
            "s|default: '${IMAGE}[^']*'|default: '${pinned}'|g"

      - name: Commit pinned digest
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/actions/
          git diff --staged --quiet || git commit -m "ci: pin image digest to ${{ github.sha }} [skip ci]"
          git push
