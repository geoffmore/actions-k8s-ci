name: test-argocd-tools

on:
  pull_request:
    paths:
      - tools/lib/common.sh
      - tools/lib/argocd.sh
      - tools/argocd-*.sh
      - testdata/argocd/**
      - testdata/image/**
      - .kube-linter.yaml

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run ArgoCD tool tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            -w /repo \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory \
            -e GIT_CONFIG_VALUE_0='*' \
            public.ecr.aws/e3l5p3n5/geoffmore/actions-k8s-ci:latest \
            testdata/argocd/test.sh
