name: test-argocd-tools

on:
  pull_request:
    paths:
      - tools/lib/common.sh
      - tools/lib/argocd.sh
      - tools/argocd-*.sh
      - tools/testdata/applications/**
      - .kube-linter.yaml

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run ArgoCD tool tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            -w /repo \
            public.ecr.aws/e3l5p3n5/geoffmore/actions-k8s-ci:latest \
            tools/testdata/applications/run-tests.sh
