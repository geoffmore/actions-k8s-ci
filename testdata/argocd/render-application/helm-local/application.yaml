apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-local
  namespace: argocd
spec:
  source:
    repoURL: https://github.com/geoffmore/actions-k8s-ci
    path: testdata/helm/render-chart/local-chart
    targetRevision: HEAD
    helm:
      releaseName: helm-local
  destination:
    server: https://kubernetes.default.svc
    namespace: default
