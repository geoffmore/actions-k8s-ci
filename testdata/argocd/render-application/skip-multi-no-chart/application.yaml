apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: skip-multi-no-chart
  namespace: argocd
spec:
  sources:
    - repoURL: https://github.com/geoffmore/actions-k8s-ci
      path: tools/testdata/applications/kustomize-local/manifests
      targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: default
