apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: default
spec:
  replicas: 1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: config
  namespace: default
data:
  key: old-value
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: default
spec:
  port: 80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: unchanged
  namespace: default
data:
  key: same-value
